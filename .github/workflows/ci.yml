name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      # next build also runs the TypeScript check
      - run: npm run build

  backend:
    name: Backend (lock + import check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Fails if pyproject.toml and uv.lock have drifted apart
      - run: uv lock --check
      - run: uv sync --frozen
      # Smoke test: the app module imports and the FastAPI instance exists
      - run: uv run python -c "from main import app"

  docker:
    name: Production images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Validates both production Dockerfile targets end to end.
      # For AWS ECS: this is where login + push to ECR and a task-definition
      # update would slot in once deployment is wired up.
      - run: docker compose -f docker-compose.prod.yml build
