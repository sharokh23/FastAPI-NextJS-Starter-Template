services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: next-fastapi-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "uv sync --frozen && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app"
    environment:
      # Add backend-only secrets here when needed; do not commit real values.
      PYTHONUNBUFFERED: "1"
      # Matches browser path /svc/api/* (Next rewrites strip this prefix to the app).
      ROOT_PATH: "/svc/api"
      # Reliable file watching for --reload when the app dir is a Docker bind mount (Windows/macOS).
      WATCHFILES_FORCE_POLLING: "true"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: next-fastapi-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Preserve container node_modules over the bind mount
      - frontend_node_modules:/app/node_modules
    environment:
      # Next.js server proxies /svc/api → FastAPI (browser-safe, no CORS).
      BACKEND_INTERNAL_URL: http://backend:8000
      # Enables webpack polling in next.config (Turbopack often misses bind-mount edits on Windows).
      DOCKER_DEV: "true"
      # Fast Refresh / HMR with bind mounts (Docker Desktop on Windows/macOS). See:
      # https://nextjs.org/docs/app/guides/local-development
      WATCHPACK_POLLING: "true"
    command: >
      sh -c "npm install && npm run dev:docker"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
